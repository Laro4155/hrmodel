name: Update Statcast Data

on:
  schedule:
    # Runs at 9 AM ET every day (1 PM UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  update-statcast:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install pybaseball pandas
          
      - name: Fetch Statcast data
        run: python fetch_statcast.py
        
      - name: Commit and push statcast.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add statcast.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Statcast data $(date +'%Y-%m-%d')"
          git push
